<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Jarvis Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#0f0d0a;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{max-width:560px;width:100%;background:#14120e;border:1px solid #2a1a0a;border-radius:14px;padding:32px}
h1{color:#F58025;font-size:22px;letter-spacing:.5px;margin-bottom:8px}
.sub{color:#888;font-size:13px;margin-bottom:24px}
.welcome{background:#0a2e1a;border:1px solid #166534;color:#4ade80;padding:14px;border-radius:10px;margin-bottom:20px;font-size:14px;display:none}
.welcome.show{display:block}
.err{background:#2e0a0a;border:1px solid #7f1d1d;color:#f87171;padding:14px;border-radius:10px;margin-bottom:20px;font-size:14px;display:none}
.err.show{display:block}
form .row{margin-bottom:16px}
form label{display:block;color:#aaa;font-size:12px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
form input{width:100%;background:#0f0d0a;border:1px solid #2a1a0a;border-radius:8px;padding:14px;color:#e0e0e0;font-size:15px;font-family:inherit}
form input:focus{outline:none;border-color:#F58025}
form input.code{font-family:'SF Mono',Consolas,Monaco,monospace;letter-spacing:4px;font-size:20px;text-align:center}
.submit{width:100%;padding:14px;background:#F58025;border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.submit:active{background:#E0721F}
.submit:disabled{background:#444;cursor:not-allowed}
.step{margin-bottom:20px;display:none}
.step.show{display:block}
.step h2{color:#F58025;font-size:13px;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.step p{color:#aaa;font-size:13px;line-height:1.5;margin-bottom:10px}
.snippet{background:#0f0d0a;border:1px solid #2a1a0a;border-radius:8px;padding:14px;font-family:'SF Mono',Consolas,Monaco,monospace;font-size:12px;color:#e0e0e0;word-break:break-all;line-height:1.5;max-height:280px;overflow-y:auto;white-space:pre-wrap}
.copy{margin-top:8px;padding:10px 16px;background:#F58025;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.copy:active{background:#E0721F}
.copy.copied{background:#4ade80}
.foot{margin-top:24px;color:#555;font-size:11px;text-align:center;line-height:1.5}
</style>
</head>
<body>
<div class="box">
<h1>JARVIS</h1>
<div class="sub">Unesi svoj email i kod koji ti je Dario poslao.</div>
<div id="welcome" class="welcome"></div>
<div id="err" class="err"></div>
<form id="loginForm">
  <div class="row">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" autocomplete="email" required>
  </div>
  <div class="row">
    <label for="code">Kod (8 znamenki)</label>
    <input type="text" id="code" name="code" class="code" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" maxlength="8" required>
  </div>
  <button type="submit" class="submit" id="submitBtn">Prijava</button>
</form>
<div id="setup" class="step">
  <h2>Jedan korak preostao</h2>
  <p>Otvori Antigravity (Claude Code) na računalu. U bilo kojem chatu, zalijepi cijeli ovaj blok i pošalji. Claude će automatski spremiti tvoj login.</p>
  <div class="snippet" id="snippet"></div>
  <button type="button" class="copy" id="copy">Kopiraj</button>
</div>
<div class="foot">Ako kod ne radi, javi Dariu — možda je istekao (24h).</div>
</div>
<script>
const PROJECT_REF = 'swmtuepntjlkfzpvplsc';
const SUPABASE_URL = 'https://' + PROJECT_REF + '.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3bXR1ZXBudGpsa2Z6cHZwbHNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MDk1MDMsImV4cCI6MjA5MDI4NTUwM30.0z2ow5b1k6dzv0pUiqyB9pfj60VPWB2tfox6gIp-pXo';

// Pre-fill email from query string if provided (e.g. ?email=ana@brza-distribucija.hr)
const params = new URLSearchParams(window.location.search);
const presetEmail = params.get('email');
if (presetEmail) document.getElementById('email').value = presetEmail;

function showError(msg) {
  const e = document.getElementById('err');
  e.textContent = msg;
  e.classList.add('show');
  document.getElementById('welcome').classList.remove('show');
}
function clearError() {
  document.getElementById('err').classList.remove('show');
}

document.getElementById('loginForm').addEventListener('submit', async (ev) => {
  ev.preventDefault();
  clearError();
  const email = document.getElementById('email').value.trim().toLowerCase();
  const code = document.getElementById('code').value.trim();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Provjeravam...';

  try {
    const r = await fetch(SUPABASE_URL + '/auth/v1/verify', {
      method: 'POST',
      headers: { 'apikey': ANON_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'email', email: email, token: code }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.msg || data.error_description || data.error || ('HTTP ' + r.status));
    if (!data.access_token || !data.refresh_token) throw new Error('Nije primljen token. Probaj ponovo.');

    const user = data.user || {};
    const name = (user.user_metadata && user.user_metadata.name) || user.email || 'there';
    const userId = user.id || '';
    const userEmail = user.email || email;
    const isOwner = userEmail === 'dario.drmac@gmail.com';
    const scope = isOwner ? 'owner' : 'employee';

    document.getElementById('welcome').textContent = 'Bok ' + name + '! Prijava potvrđena.';
    document.getElementById('welcome').classList.add('show');
    document.getElementById('loginForm').style.display = 'none';

    const py = "python3 -c \"import json,os; p=os.path.expanduser('~/.claude/jarvis-secrets.json'); os.makedirs(os.path.dirname(p), exist_ok=True); d=json.load(open(p)) if os.path.exists(p) else {'version':1,'scope':'" + scope + "','supabase':{'project_ref':'" + PROJECT_REF + "','anon_key':'" + ANON_KEY + "'},'user':{},'device':{}}; d.setdefault('user',{}); d['user']['user_id']='" + userId + "'; d['user']['email']='" + userEmail + "'; d['user']['jarvis_refresh_token']='" + data.refresh_token + "'; json.dump(d, open(p,'w'), indent=2); print('Jarvis login spremljen za " + name + "')\"";
    document.getElementById('snippet').textContent = py;
    document.getElementById('setup').classList.add('show');
    document.getElementById('copy').onclick = () => {
      navigator.clipboard.writeText(py).then(() => {
        const b = document.getElementById('copy');
        b.textContent = 'Kopirano - zalijepi u Antigravity sad';
        b.classList.add('copied');
      });
    };
  } catch (e) {
    showError('Greška: ' + e.message + '. Provjeri email i kod, ili javi Dariu za novi.');
    btn.disabled = false;
    btn.textContent = 'Prijava';
  }
});
</script>
</body>
</html>
