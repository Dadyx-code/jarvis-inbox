<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Jarvis Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#0f0d0a;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{max-width:680px;width:100%;background:#14120e;border:1px solid #2a1a0a;border-radius:14px;padding:32px}
h1{color:#F58025;font-size:22px;letter-spacing:.5px;margin-bottom:8px}
.sub{color:#888;font-size:13px;margin-bottom:24px}
.welcome{background:#0a2e1a;border:1px solid #166534;color:#4ade80;padding:14px;border-radius:10px;margin-bottom:20px;font-size:14px;display:none}
.welcome.show{display:block}
.err{background:#2e0a0a;border:1px solid #7f1d1d;color:#f87171;padding:14px;border-radius:10px;margin-bottom:20px;font-size:14px;display:none}
.err.show{display:block}
.step{margin-bottom:20px}
.step h2{color:#F58025;font-size:13px;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.step p{color:#aaa;font-size:13px;line-height:1.5;margin-bottom:10px}
.snippet{background:#0f0d0a;border:1px solid #2a1a0a;border-radius:8px;padding:14px;font-family:'SF Mono',Consolas,Monaco,monospace;font-size:12px;color:#e0e0e0;word-break:break-all;line-height:1.5;max-height:280px;overflow-y:auto;white-space:pre-wrap}
.copy{margin-top:8px;padding:10px 16px;background:#F58025;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.copy:active{background:#E0721F}
.copy.copied{background:#4ade80}
.foot{margin-top:24px;color:#555;font-size:11px;text-align:center;line-height:1.5}
</style>
</head>
<body>
<div class="box">
<h1>JARVIS</h1>
<div class="sub">Finishing your login...</div>
<div id="welcome" class="welcome"></div>
<div id="err" class="err"></div>
<div id="setup" style="display:none">
  <div class="step">
    <h2>One step left</h2>
    <p>Open Antigravity (Claude Code) on your computer. In any chat, paste this entire block and send. Claude will save your login automatically.</p>
    <div class="snippet" id="snippet"></div>
    <button class="copy" id="copy">Copy</button>
  </div>
  <div class="foot">After it runs, your Jarvis brain skill will recognize you. You will not see this page again.</div>
</div>
</div>
<script>
var SUPABASE_URL = 'https://swmtuepntjlkfzpvplsc.supabase.co';
var PROJECT_REF = 'swmtuepntjlkfzpvplsc';
var ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3bXR1ZXBudGpsa2Z6cHZwbHNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MDk1MDMsImV4cCI6MjA5MDI4NTUwM30.0z2ow5b1k6dzv0pUiqyB9pfj60VPWB2tfox6gIp-pXo';

async function start() {
  var hash = window.location.hash.replace(/^#/, '');
  if (!hash) return showError('No login token in this URL. The link may have already been used. Ask Dario for a new one.');
  var params = new URLSearchParams(hash);
  var access_token = params.get('access_token');
  var refresh_token = params.get('refresh_token');
  var error_description = params.get('error_description');
  if (error_description) return showError(decodeURIComponent(error_description.replace(/\+/g, ' ')) + '. Ask Dario for a fresh link.');
  if (!access_token || !refresh_token) return showError('Login token incomplete. Ask Dario for a new link.');

  var user = null;
  try {
    var r = await fetch(SUPABASE_URL + '/auth/v1/user', { headers: { apikey: ANON_KEY, Authorization: 'Bearer ' + access_token } });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    user = await r.json();
  } catch (e) {
    return showError('Could not verify login: ' + e.message);
  }

  var name = (user.user_metadata && user.user_metadata.name) || user.email || 'there';
  var email = user.email || '';
  var userId = user.id || '';
  var isOwner = email === 'dario.drmac@gmail.com';
  var scope = isOwner ? 'owner' : 'employee';

  document.getElementById('welcome').textContent = 'Welcome, ' + name + '! Login confirmed.';
  document.getElementById('welcome').classList.add('show');
  document.getElementById('setup').style.display = 'block';

  var py = "python3 -c \"import json,os; p=os.path.expanduser('~/.claude/jarvis-secrets.json'); os.makedirs(os.path.dirname(p), exist_ok=True); d=json.load(open(p)) if os.path.exists(p) else {'version':1,'scope':'" + scope + "','supabase':{'project_ref':'" + PROJECT_REF + "','anon_key':'" + ANON_KEY + "'},'user':{},'device':{}}; d.setdefault('user',{}); d['user']['user_id']='" + userId + "'; d['user']['email']='" + email + "'; d['user']['jarvis_refresh_token']='" + refresh_token + "'; json.dump(d, open(p,'w'), indent=2); print('Jarvis login saved for " + name + "')\"";

  document.getElementById('snippet').textContent = py;
  document.getElementById('copy').onclick = function() {
    navigator.clipboard.writeText(py).then(function() {
      var b = document.getElementById('copy');
      b.textContent = 'Copied - paste in Antigravity now';
      b.classList.add('copied');
    });
  };
}
function showError(msg) {
  var e = document.getElementById('err');
  e.textContent = msg;
  e.classList.add('show');
}
start();
</script>
</body>
</html>
