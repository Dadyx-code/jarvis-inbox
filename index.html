<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<title>Jarvis Inbox</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh;min-height:100dvh;padding:16px;padding-top:max(16px,env(safe-area-inset-top));padding-bottom:max(16px,env(safe-area-inset-bottom))}
.hdr{text-align:center;padding:12px 0 20px}
.hdr h1{font-size:20px;font-weight:600;color:#60a5fa;letter-spacing:.5px}
.hdr .sub{font-size:12px;color:#666;margin-top:4px}
.st{text-align:center;font-size:12px;padding:6px;border-radius:6px;margin-bottom:16px;display:none}
.st.ok{display:block;background:#0a2e1a;color:#4ade80;border:1px solid #166534}
.st.err{display:block;background:#2e0a0a;color:#f87171;border:1px solid #7f1d1d}
.st.wait{display:block;background:#1a1a2e;color:#60a5fa;border:1px solid #1e3a5f}
.ia{background:#141420;border:1px solid #2a2a3a;border-radius:12px;padding:16px;margin-bottom:16px}
textarea{width:100%;min-height:120px;background:#0a0a0f;border:1px solid #2a2a3a;border-radius:8px;color:#e0e0e0;font-size:16px;padding:12px;resize:vertical;font-family:inherit}
textarea:focus{outline:none;border-color:#60a5fa}
textarea::placeholder{color:#444}
.cg{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.ch{padding:8px 16px;border-radius:20px;border:1px solid #2a2a3a;background:#141420;color:#999;font-size:13px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.ch.on{border-color:#60a5fa;color:#60a5fa;background:#1a1a2e}
.ch:active{transform:scale(.95)}
.pc{padding:6px 14px;border-radius:16px;border:1px solid #2a2a3a;background:#141420;color:#666;font-size:12px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.pc.pl{border-color:#4ade80;color:#4ade80;background:#0a2e1a}
.pc.pn{border-color:#60a5fa;color:#60a5fa;background:#1a1a2e}
.pc.ph{border-color:#fb923c;color:#fb923c;background:#2e1a0a}
.pc.pu{border-color:#f87171;color:#f87171;background:#2e0a0a}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sg label{display:block;font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
select{width:100%;background:#0a0a0f;border:1px solid #2a2a3a;border-radius:8px;color:#e0e0e0;font-size:14px;padding:10px;appearance:none;font-family:inherit}
select:focus{outline:none;border-color:#60a5fa}
.btn{width:100%;padding:16px;border:none;border-radius:12px;background:#2563eb;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.98);background:#1d4ed8}
.btn:disabled{background:#1e293b;color:#475569}
.hs{margin-top:24px;border-top:1px solid #1a1a2a;padding-top:16px}
.hs h3{font-size:12px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.hi{background:#141420;border:1px solid #1a1a2a;border-radius:8px;padding:12px;margin-bottom:8px;font-size:13px}
.hi .m{font-size:11px;color:#555;margin-top:4px}
.hi .m span{margin-right:8px}
.es{text-align:center;color:#333;font-size:13px;padding:20px}
</style>
</head>
<body>
<div class="hdr"><h1>JARVIS INBOX</h1><div class="sub">Speak it. Send it. Jarvis remembers.</div></div>
<div id="st" class="st"></div>
<div class="ia"><textarea id="ct" placeholder="Tap here and speak with Wispr Flow, or type your idea..."></textarea></div>
<div class="cg" id="cats"><div class="ch on" data-v="idea">Idea</div><div class="ch" data-v="task">Task</div><div class="ch" data-v="decision">Decision</div><div class="ch" data-v="note">Note</div></div>
<div class="cg" id="pris"><div class="pc" data-v="low">Low</div><div class="pc pn" data-v="normal">Normal</div><div class="pc" data-v="high">High</div><div class="pc" data-v="urgent">Urgent</div></div>
<div class="sg"><div><label>Company</label><select id="co"><option value="">None</option><option value="craft-technology">Craft Technology</option><option value="wine-and-more">Wine &amp; More</option><option value="tipsy">Tipsy</option><option value="brza-distribucija">Brza Distribucija</option><option value="croatian-wine">Croatian Wine</option><option value="digital-agency">Digital Agency</option></select></div><div><label>Project</label><select id="pr"><option value="">None</option><option value="tipsy-masterclass">Tipsy Masterclass</option><option value="craft-platform">Craft Platform</option><option value="le-clinic-invisalign">Le Clinic</option><option value="ad-creation-tool">Ad Creation</option><option value="linkedin-analyzer">LinkedIn Analyzer</option><option value="jarvis-brain">Jarvis Brain</option></select></div></div>
<button class="btn" id="sb">Send to Jarvis</button>
<div class="hs"><h3>Recent</h3><div id="hl"><div class="es">No entries yet. Send your first idea!</div></div></div>
<script>
var SB='https://swmtuepntjlkfzpvplsc.supabase.co';
var SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3bXR1ZXBudGpsa2Z6cHZwbHNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MDk1MDMsImV4cCI6MjA5MDI4NTUwM30.0z2ow5b1k6dzv0pUiqyB9pfj60VPWB2tfox6gIp-pXo';
var cat='idea',pri='normal';
document.querySelectorAll('#cats .ch').forEach(function(c){c.addEventListener('click',function(){document.querySelectorAll('#cats .ch').forEach(function(x){x.classList.remove('on')});c.classList.add('on');cat=c.dataset.v})});
document.querySelectorAll('#pris .pc').forEach(function(c){c.addEventListener('click',function(){document.querySelectorAll('#pris .pc').forEach(function(x){x.className='pc'});c.classList.add('p'+c.dataset.v[0]);pri=c.dataset.v})});
function ss(msg,type){var el=document.getElementById('st');el.textContent=msg;el.className='st '+type;if(type==='ok')setTimeout(function(){el.className='st'},3000)}
function sv(content,category,priority,company){var h=JSON.parse(localStorage.getItem('ji')||'[]');h.unshift({c:content.substring(0,100)+(content.length>100?'...':''),t:category,p:priority,o:company,tm:new Date().toLocaleTimeString('hr-HR',{hour:'2-digit',minute:'2-digit'}),dt:new Date().toLocaleDateString('hr-HR')});if(h.length>20)h.pop();localStorage.setItem('ji',JSON.stringify(h));rh()}
function rh(){var h=JSON.parse(localStorage.getItem('ji')||'[]');var el=document.getElementById('hl');if(!h.length){el.innerHTML='<div class="es">No entries yet. Send your first idea!</div>';return}var s='';for(var i=0;i<h.length;i++){s+='<div class="hi">'+h[i].c+'<div class="m"><span>'+h[i].t+'</span><span>'+h[i].p+'</span>'+(h[i].o?'<span>'+h[i].o+'</span>':'')+'<span>'+h[i].dt+' '+h[i].tm+'</span></div></div>'}el.innerHTML=s}
document.getElementById('sb').addEventListener('click',function(){var content=document.getElementById('ct').value.trim();if(!content){ss('Write or speak something first','err');return}var btn=document.getElementById('sb');btn.disabled=true;btn.textContent='Sending...';ss('Sending to Jarvis...','wait');var company=document.getElementById('co').value||null;var project=document.getElementById('pr').value||null;fetch(SB+'/rest/v1/inbox',{method:'POST',headers:{'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK,'Prefer':'return=minimal'},body:JSON.stringify({content:content,category:cat,priority:pri,company_hint:company,project_hint:project})}).then(function(res){if(!res.ok)throw new Error('HTTP '+res.status);ss('Sent! Jarvis will process this next session.','ok');sv(content,cat,pri,company);document.getElementById('ct').value='';if(navigator.vibrate)navigator.vibrate(50)}).catch(function(err){ss('Failed: '+err.message,'err')}).finally(function(){btn.disabled=false;btn.textContent='Send to Jarvis'})});
rh();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){})}
</script>
</body>
</html>
